<!DOCTYPE html>
<html>
<head>
<title>TheOrangeCow</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
}

.switch {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 100;
}

.switch input {
    display: none;
}

.slider {
    width: 50px;
    height: 25px;
    background: #222;
    border-radius: 25px;
    position: relative;
    cursor: pointer;
}

.slider::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: #00ff00;
    border-radius: 50%;
    top: 2.5px;
    left: 3px;
    transition: 0.3s;
}

input:checked + .slider::before {
    transform: translateX(24px);
}

#terminal {
    width: 90%;
    margin: 100px auto;
    padding: 15px;
    border: 2px solid #00ff00;
}

#buttonUI {
    display: none;
    padding: 80px 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.grid button {
    padding: 15px;
    background: black;
    border: 1px solid #00ff00;
    color: #00ff00;
    font-size: 12px;
}


@media (max-width: 700px) {
    #terminal {
        display: none;
    }
    #buttonUI {
        display: block;
    }
}
</style>
</head>

<body>


<label class="switch">
    <input type="checkbox" id="modeSwitch">
    <div class="slider"></div>
</label>


<div id="terminal">
    <div id="output"></div>
    <div>
        <span id="prompt"></span>
        <span id="typed"></span><span>█</span>
    </div>
    <input id="cmd">
</div>


<div id="buttonUI">
    <div class="grid">
        <button onclick="sendCmd('dir')">DIR</button>
        <button onclick="sendCmd('cd ..')">BACK</button>
        <button onclick="sendCmd('protect')">PROTECT</button>
        <button onclick="sendCmd('clear')">CLEAR</button>
        <button onclick="sendCmd('whoami')">WHOAMI</button>
        <button onclick="sendCmd('help')">HELP</button>
    </div>
</div>

<script>
const terminal = document.getElementById("terminal");
const buttonUI = document.getElementById("buttonUI");
const input = document.getElementById("cmd");
const typed = document.getElementById("typed");
const output = document.getElementById("output");
const promptSpan = document.getElementById("prompt");
const switchEl = document.getElementById("modeSwitch");

let currentPath = "C:\\TheOrangeCow>";

function updatePrompt() {
    promptSpan.textContent = currentPath + " ";
}
updatePrompt();

switchEl.addEventListener("change", () => {
    if (switchEl.checked) {
        terminal.style.display = "none";
        buttonUI.style.display = "block";
    } else {
        terminal.style.display = "block";
        buttonUI.style.display = "none";
    }
});

function checkScreen() {
    if (window.innerWidth < 700) {
        switchEl.checked = true;
        terminal.style.display = "none";
        buttonUI.style.display = "block";
    }
}
window.addEventListener("load", checkScreen);

document.body.addEventListener("click", () => input.focus());

input.addEventListener("input", () => {
    typed.textContent = input.value;
});

input.addEventListener("keydown", async e => {
    if (e.key === "Enter") {
        runCommand(input.value);
    }
});

function sendCmd(cmd) {
    runCommand(cmd);
}

async function runCommand(cmd) {
    cmd = cmd.trim().toLowerCase();
    output.innerHTML += currentPath + " " + cmd + "\n";

    try {
        const res = await fetch("/command", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ command: cmd })
        });

        const data = await res.json();

        if (data.output) output.innerHTML += data.output + "\n";
        if (data.prompt) {
            currentPath = data.prompt;
            updatePrompt();
        }
        if (data.redirect) {
            window.location.href = data.redirect;
        }

    } catch {
        output.innerHTML += "Error\n";
    }

    input.value = "";
    typed.textContent = "";
}

function isMobile() {
    return window.innerWidth < 700;
}

if (!isMobile()) {
    setInterval(() => {
        const ball = document.createElement("div");
        ball.style.position = "absolute";
        ball.style.width = "20px";
        ball.style.height = "20px";
        ball.style.background = "red";
        ball.style.borderRadius = "50%";
        ball.style.left = Math.random() * window.innerWidth + "px";
        ball.style.top = "-20px";
        document.body.appendChild(ball);

        let speed = Math.random() + 1;

        function fall() {
            let top = parseFloat(ball.style.top);
            ball.style.top = top + speed + "px";

            if (top > window.innerHeight) {
                ball.remove();
                return;
            }

            requestAnimationFrame(fall);
        }
        fall();
    }, 800);
}
</script>

</body>
</html>
